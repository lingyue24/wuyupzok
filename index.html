<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>企業知識管理系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <span id="db-name-display">載入中...</span>
        <button id="admin-toggle" onclick="toggleAdmin()">🔐 管理模式</button>
    </div>
    <div id="nav-tree"></div>
</div>

<div id="sidebar-overlay" onclick="closeMenu()"></div>

<div id="main-container">
    <header>
        <div class="header-content">
            <button onclick="toggleMenu(event)" class="mobile-only">☰</button>
            <input type="text" id="search-bar" placeholder="🔍 搜尋內容...">
        </div>
    </header>

    <main id="content">
        <div id="settings-area" style="display:none; padding:10px;">
            <button class="btn btn-outline" onclick="openModal()">⚙ 系統進階設定</button>
        </div>

        <div id="display-view"></div>

        <div id="admin-panel" style="display:none;" class="card">
            <h3>📂 管理面版</h3>
            <div id="current-path">📍 請選取路徑</div>
            <div class="btn-group-row">
                <button class="btn btn-save" onclick="addRootCategory()">新增總分類</button>
                <button class="btn btn-accent" onclick="addCategory()">新增子分類</button>
            </div>
            <hr>
            <div class="editor-form">
                <input type="text" id="edit-title" placeholder="標題">
                <textarea id="edit-desc" placeholder="內容" rows="5"></textarea>
                <div class="img-input-group">
                    <input type="text" id="input-img-url" placeholder="圖片網址">
                    <button onclick="addImgByUrl()">新增</button>
                </div>
                <div id="img-manager-zone"></div>
                <button id="btn-save-main" class="btn btn-save" style="width:100%;" onclick="saveContent()">💾 儲存並同步雲端</button>
            </div>
        </div>
    </main>
</div>

<div id="settings-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>🛠 進階設定</h3>
        <label>系統名稱</label>
        <input type="text" id="set-db-name" style="width:100%; margin-bottom:10px;">
        <label>新管理密碼</label>
        <input type="password" id="set-new-pw" style="width:100%; margin-bottom:10px;">
        
        <div class="btn-group-row">
            <button class="btn btn-outline" onclick="exportDB()">📦 備份匯出</button>
            <button class="btn btn-outline" onclick="document.getElementById('import-f').click()">📥 資料匯入</button>
        </div>
        <input type="file" id="import-f" hidden onchange="importDB(this)">
        
        <button class="btn btn-save" onclick="saveSettings()" style="width:100%; margin-top:10px;">更新設定</button>
        <button class="btn btn-outline" onclick="closeModal()" style="width:100%; margin-top:5px;">取消</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
