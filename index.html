<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>V6.9 旗艦知識管理系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sidebar-overlay" onclick="closeMenu()"></div>

<div id="sidebar">
    <div class="sidebar-header">
        <span id="db-name-display">載入中...</span>
        <button id="admin-toggle" onclick="toggleAdmin()">🔐 管理模式</button>
    </div>
    <div id="nav-tree"></div>
</div>

<div id="main-container">
    <header id="top-header">
        <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
            <button onclick="toggleMenu()" class="mobile-only">☰</button>
            <input type="text" id="search-bar" placeholder="🔍 搜尋標題或內容..." oninput="smartSearch()">
        </div>
    </header>

    <main id="content">
        <div id="settings-button-area" style="display:none; margin-bottom: 15px;">
            <button id="btn-settings" class="btn btn-outline" onclick="openModal()" style="width: 100%; border: 1px solid #ddd; background: #fff; padding: 12px;">⚙ 系統進階設定</button>
        </div>

        <div id="display-view"></div>

        <div id="admin-panel" style="display:none;" class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin:0;">📂 分類與內容管理</h3>
                <button class="btn btn-danger" onclick="exitAdmin()" style="padding: 5px 15px;">❌ 退出管理</button>
            </div>
            
            <div id="current-path" style="font-weight: bold; color: #3498db; margin-bottom: 10px;">📍 請選取路徑</div>
            
            <div class="btn-group-row">
                <button class="btn btn-save" onclick="addRootCategory()" style="width:100%; margin-bottom:10px;">🌟 新增「第一層」總分類</button>
                <button class="btn btn-accent" onclick="addCategory()" style="flex:1;">➕ 新增子分類</button>
                <button class="btn btn-outline" onclick="renameCategory()" style="flex:1;">✏ 改名</button>
                <button class="btn btn-danger" onclick="deleteCategory()" style="flex:1;">🗑 刪除分類</button>
            </div>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

            <div class="editor-form">
                <div class="form-group">
                    <label>📌 內容標題</label>
                    <input type="text" id="edit-title" placeholder="請輸入標題...">
                </div>
                
                <div class="form-group">
                    <label>📝 資訊內容</label>
                    <textarea id="edit-desc" placeholder="請輸入詳細說明..." rows="8"></textarea>
                </div>
                
                <div class="form-group">
                    <label>🖼 圖片管理</label>
                    <input type="file" id="input-file" accept="image/*" onchange="addLocalImg(this)">
                </div>
                <div id="img-manager-zone" class="img-manager"></div>
                
                <div class="btn-group-row" style="margin-top:20px; padding-bottom:30px;">
                    <button id="btn-save-main" class="btn btn-save" onclick="saveContent()" style="flex:2;">💾 儲存內容</button>
                    <button id="btn-cancel-edit" class="btn btn-outline" onclick="exitEdit()" style="display:none; flex:1;">取消</button>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="settings-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>🛠 系統進階設定</h3>
        <div class="editor-form">
            <label>資料庫顯示名稱</label>
            <input type="text" id="set-db-name">
            <label>管理密碼</label>
            <input type="password" id="set-new-pw" placeholder="輸入新密碼">
            <button class="btn btn-save" onclick="saveSettings()">更新系統設定</button>
            <div class="btn-group-row" style="margin-top:15px;">
                <button class="btn btn-outline" onclick="exportDB()" style="flex:1">📦 備份匯出</button>
                <button class="btn btn-outline" onclick="document.getElementById('import-f').click()" style="flex:1">📥 匯入</button>
            </div>
            <input type="file" id="import-f" hidden onchange="importDB(this)">
            <button class="btn btn-outline" style="width:100%; margin-top:10px;" onclick="closeModal()">關閉</button>
        </div>
    </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
