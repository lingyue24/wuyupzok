<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>V6.9 旗艦知識庫</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sidebar-overlay" onclick="closeMenu()"></div>

<div id="sidebar">
    <div class="sidebar-header">
        <span id="db-name-display">我的知識庫</span>
        <button id="admin-toggle" onclick="toggleAdmin()">🔐 管理模式</button>
    </div>
    <div id="nav-tree"></div>
</div>

<div id="main-container">
    <header>
        <div class="header-left">
            <button id="menu-btn" onclick="openMenu()">☰</button>
            <input type="text" id="search-bar" placeholder="🔍 搜尋..." oninput="smartSearch()">
        </div>
        <button id="btn-settings" onclick="openModal()" style="display:none;">⚙ 設定</button>
    </header>

    <main id="content">
        <div id="display-view"></div>

        <div id="admin-panel" style="display:none;" class="card">
            <h3>📂 內容編輯</h3>
            <div id="current-path" style="margin-bottom:10px; color:#666;">📍 未選取路徑</div>
            
            <div class="btn-group-row" style="display:flex; gap:5px; margin-bottom:15px;">
                <button class="btn btn-accent" onclick="addCategory()" style="flex:1;">➕ 子分類</button>
                <button class="btn btn-outline" onclick="renameCategory()" style="flex:1;">✏ 改名</button>
                <button class="btn btn-danger" onclick="deleteCategory()" style="flex:1;">🗑 刪除</button>
            </div>

            <div class="editor-form">
                <label>📌 標題</label>
                <input type="text" id="edit-title" placeholder="請輸入標題">
                
                <label>📝 描述</label>
                <textarea id="edit-desc" placeholder="請輸入描述內容"></textarea>
                
                <label>🖼 圖片管理</label>
                <div class="image-input-area">
                    <input type="file" id="input-file" accept="image/*" onchange="addLocalImg(this)">
                    <div style="display:flex; gap:5px; margin-top:5px;">
                        <input type="text" id="input-url" placeholder="輸入網址..." style="flex:1;">
                        <button class="btn btn-outline" onclick="addUrlImg()">新增</button>
                    </div>
                </div>
                <div id="img-manager-zone" class="img-manager"></div>
                
                <div style="margin-top: 20px; padding-bottom: 40px;">
                    <button id="btn-save-main" class="btn btn-save" onclick="saveContent()">💾 儲存內容</button>
                    <button id="btn-cancel-edit" class="btn btn-outline" onclick="exitEdit()" style="display:none; width:100%; margin-top:10px;">取消編輯</button>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="settings-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>🛠 系統設定</h3>
        <input type="text" id="set-db-name" placeholder="資料庫名稱">
        <input type="password" id="set-new-pw" placeholder="新密碼">
        <button class="btn btn-save" onclick="saveSettings()">更新設定</button>
        <button class="btn btn-outline" onclick="exportDB()">📦 備份匯出</button>
        <button class="btn btn-outline" onclick="closeModal()">關閉</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
